<svg xmlns="http://www.w3.org/2000/svg" width="420" height="40" role="img" aria-label="Claw5G: Agentic 5G Defender">
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#444" stop-opacity=".7"/>
    <stop offset=".1" stop-opacity=".1"/>
    <stop offset=".9" stop-opacity=".3"/>
    <stop offset="1" stop-opacity=".5"/>
  </linearGradient>

  <!-- Left section -->
  <rect rx="6" width="150" height="40" fill="#24292e"/>
  
  <!-- Right section -->
  <rect rx="6" x="150" width="270" height="40" fill="#d73a49"/>

  <!-- Gradient overlay -->
  <rect rx="6" width="420" height="40" fill="url(#s)"/>

  <!-- Claw icon -->
  <g transform="translate(10,8)">
    <path d="M10 12 C4 6,4 0,10 2 C12 6,14 6,16 2 C22 0,22 6,16 12 Z" fill="white"/>
    <circle cx="13" cy="8" r="1.5" fill="#24292e"/>
  </g>

  <!-- 5G signal icon -->
  <g transform="translate(128,8)">
    <path d="M6 20 V10" stroke="white" stroke-width="2"/>
    <path d="M1 14 Q6 8 11 14" stroke="white" stroke-width="2" fill="none"/>
    <path d="M-3 10 Q6 0 15 10" stroke="white" stroke-width="2" fill="none"/>
  </g>

  <!-- Left text -->
  <text x="40" y="25" fill="#fff" font-family="Verdana,Arial,sans-serif" font-size="14">
    Claw5G
  </text>

  <!-- Right text -->
  <text x="170" y="25" fill="#fff" font-family="Verdana,Arial,sans-serif" font-size="14">
    Agentic 5G Defender
  </text>
</svg>