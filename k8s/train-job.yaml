# Kubernetes Job to train the XGBoost classifier inside the cluster
# Run after populating the data PVC with the NCSRD-DS-5GDDoS dataset files.
#
# Usage:
#   kubectl apply -f k8s/train-job.yaml
#   kubectl logs -f job/train-classifier -n 5g-ddos-mcp

apiVersion: batch/v1
kind: Job
metadata:
  name: train-classifier
  namespace: 5g-ddos-mcp
  labels:
    app.kubernetes.io/name: 5g-ddos-mcp
    app.kubernetes.io/component: model-training
spec:
  ttlSecondsAfterFinished: 3600    # Auto-clean job after 1 hour
  template:
    metadata:
      labels:
        app: train-classifier
    spec:
      restartPolicy: Never

      containers:
        - name: trainer
          image: 5g-ddos-mcp:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - scripts/train_model.py
          args:
            - "--test-frac"
            - "0.2"

          envFrom:
            - configMapRef:
                name: 5g-ddos-mcp-config

          volumeMounts:
            - name: data-volume
              mountPath: /app/data
              readOnly: true
            - name: models-volume
              mountPath: /app/models
              readOnly: false

          resources:
            requests:
              cpu:    "2000m"
              memory: "4Gi"
            limits:
              cpu:    "4000m"
              memory: "8Gi"

      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: 5g-ddos-data-pvc
        - name: models-volume
          persistentVolumeClaim:
            claimName: 5g-ddos-models-pvc

  backoffLimit: 2
