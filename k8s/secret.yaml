# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: Replace placeholder values with base64-encoded real values.
#
# Encode a value:
#   echo -n "sk-ant-your-key" | base64
#
# Or use kubectl:
#   kubectl create secret generic 5g-ddos-mcp-secrets \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     -n 5g-ddos-mcp
#
# For production, use Sealed Secrets, Vault, or AWS/GCP/Azure secret managers.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: 5g-ddos-mcp-secrets
  namespace: 5g-ddos-mcp
  labels:
    app.kubernetes.io/name: 5g-ddos-mcp
    app.kubernetes.io/component: mcp-server
type: Opaque
data:
  # base64-encoded API keys
  ANTHROPIC_API_KEY: REPLACE_WITH_BASE64_ENCODED_KEY
  OPENAI_API_KEY:    REPLACE_WITH_BASE64_ENCODED_KEY
