version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# 5G-DDoS MCP — Docker Compose
#
# Profiles:
#   default (no profile)  : MCP server only
#   with-ollama           : MCP server + Ollama (local LLMs)
#   full                  : MCP server + Ollama + InfluxDB (live telemetry)
#
# Quick start (Claude backend):
#   cp .env.example .env  # fill in ANTHROPIC_API_KEY
#   docker compose up
#
# With Ollama (open-source LLM):
#   docker compose --profile with-ollama up
#   # Then pull a model:
#   docker exec -it ollama ollama pull llama3.2
#
# With InfluxDB for live 5G telemetry:
#   docker compose --profile full up
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MCP Server ─────────────────────────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: 5g-ddos-mcp:latest
    container_name: 5g-ddos-mcp
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${MCP_PORT:-8000}:8000"
    volumes:
      # Mount dataset (place CSV files here before running)
      - ./data:/app/data:ro
      # Mount trained model artifacts (generated by train_model.py)
      - ./models:/app/models:rw
    depends_on:
      ollama:
        condition: service_started
        required: false
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "python", "-c", "from src.config import server_config; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.ncsrd.project=5g-ddos-mcp"
      - "com.ncsrd.component=mcp-server"

  # ── Ollama (local open-source LLMs) ────────────────────────────────────────
  # Profile: with-ollama
  # After starting, pull a model: docker exec -it ollama ollama pull llama3.2
  # Supported models: llama3.2, mistral, phi4, gemma3, deepseek-r1, qwen2.5
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles:
      - with-ollama
      - full
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # Uncomment for GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - mcp-network
    labels:
      - "com.ncsrd.project=5g-ddos-mcp"
      - "com.ncsrd.component=ollama"

  # ── InfluxDB (live 5G telemetry ingestion) ──────────────────────────────────
  # Profile: full
  # Mirrors the InfluxDB collection pipeline used to generate the NCSRD dataset
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    profiles:
      - full
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=influxpassword
      - DOCKER_INFLUXDB_INIT_ORG=ncsrd
      - DOCKER_INFLUXDB_INIT_BUCKET=5g-telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=5gddos-influx-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - mcp-network
    labels:
      - "com.ncsrd.project=5g-ddos-mcp"
      - "com.ncsrd.component=influxdb"

  # ── Grafana (optional monitoring dashboard) ─────────────────────────────────
  # Profile: full
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles:
      - full
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - mcp-network
    labels:
      - "com.ncsrd.project=5g-ddos-mcp"
      - "com.ncsrd.component=grafana"

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  mcp-network:
    driver: bridge
    name: 5g-ddos-mcp-network

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  ollama-models:
    name: 5g-ddos-ollama-models
  influxdb-data:
    name: 5g-ddos-influxdb-data
  grafana-data:
    name: 5g-ddos-grafana-data
